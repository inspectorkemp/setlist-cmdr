<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=1.0, maximum-scale=3.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Setlist CMDR — Stage</title>
<link rel="manifest" href="/static/manifest-musician.json">
<link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
<meta name="theme-color" content="#08080f">
<!-- Fonts served locally if setup-fonts.sh has been run, otherwise via Google -->
<link rel="stylesheet" href="/fonts.css">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
<style>
:root {
  --purple: #0ea5e9;
  --bg:        #08080f;
  --surface:   #111118;
  --border:    #1c1c26;
  --amber:     #f59e0b;
  --amber-glow:rgba(245,158,11,0.18);
  --text:      #ebebf0;
  --dim:       #52525b;
  --green:     #22c55e;
  --red:       #ef4444;
  --blue:      #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; touch-action: manipulation; }

/* ── Name screen ──────────────────────────────────────────── */
#name-screen {
  position:fixed; inset:0; background:var(--bg); z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px; padding:40px;
}
/* name-screen h1 replaced by logo image */
#name-screen p { color:var(--dim); font-size:1.05rem; }
#name-input {
  background:var(--surface); border:2px solid var(--border); border-radius:14px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:1.5rem;
  padding:16px 24px; text-align:center; width:100%; max-width:380px; outline:none;
  transition:border-color .2s;
}
#name-input:focus { border-color:var(--amber); }
.join-btn {
  background:var(--amber); border:none; border-radius:14px; color:#000;
  cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:1.8rem;
  letter-spacing:3px; padding:14px 56px; transition:opacity .15s;
}
.join-btn:active { opacity:.75; }
.member-btn {
  background:var(--surface); border:2px solid var(--border); border-radius:12px;
  color:var(--text); cursor:pointer; font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem; letter-spacing:2px; padding:12px 20px;
  transition:border-color .15s, background .15s; min-width:100px;
}
.member-btn:hover, .member-btn:active { border-color:var(--amber); background:var(--amber-glow); }

/* ── Main app ─────────────────────────────────────────────── */
#app { display:none; flex-direction:column; height:100%; }

/* Header */
#hdr {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.dot {
  width:9px; height:9px; border-radius:50%; background:var(--dim); flex-shrink:0;
  transition:background .3s, box-shadow .3s;
}
.dot.on  { background:var(--green); box-shadow:0 0 8px var(--green); }
.dot.off { background:var(--red); }
#sl-name { font-family:'Bebas Neue',sans-serif; font-size:1.35rem; letter-spacing:2px;
           color:var(--amber); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#pos-badge { font-family:'DM Mono',monospace; font-size:.82rem; color:var(--dim); flex-shrink:0; }

/* Song title bar */
#song-bar {
  background:var(--amber-glow); border-bottom:2px solid var(--amber);
  padding:12px 16px; flex-shrink:0;
}
#song-title {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,7vw,4rem);
  letter-spacing:3px; line-height:1.05; color:var(--text);
}
#song-meta {
  font-family:'DM Mono',monospace; font-size:.8rem; color:var(--dim);
  margin-top:5px; display:flex; flex-wrap:wrap; gap:14px;
}
#song-meta b { color:var(--amber); font-weight:400; }

/* Next-song ribbon */
#next-bar {
  background:var(--bg); border-bottom:1px solid var(--border);
  padding:7px 16px; font-size:.78rem; color:var(--dim);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.next-lbl { text-transform:uppercase; letter-spacing:1px; font-size:.68rem; color:var(--dim); }
#next-title { color:var(--text); }

/* Content area */
#content-wrap { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative; }
#content-wrap::-webkit-scrollbar { display:none; }
#song-content {
  font-family:'DM Mono',monospace;
  font-size:clamp(1.05rem,3.8vw,1.45rem);
  line-height:2; white-space:pre-wrap; color:var(--text);
  padding:20px 18px 100px;
}
.chord { color:var(--amber); font-weight:500; font-size:.82em;
         position:relative; top:-.3em; margin: 0 1px; }

/* Waiting state */
#waiting {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:18px; color:var(--dim); text-align:center; padding:40px;
  position:relative; overflow:hidden;
}
#waiting h2 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; }
#waiting p  { max-width:280px; line-height:1.6; }
.wait-corner {
  position:absolute; width:clamp(80px,18vw,140px); height:auto; opacity:.15; pointer-events:none;
}
.wait-tl { top:0; right:0; }
.wait-br { bottom:0; left:0; }

/* Bottom controls */
#controls {
  background:var(--surface); border-top:1px solid var(--border);
  padding:9px 12px; display:flex; align-items:center; gap:9px; flex-shrink:0;
}
.ctrl {
  background:var(--border); border:none; border-radius:10px; color:var(--text);
  cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:600;
  padding:10px 14px; transition:background .15s; flex-shrink:0; line-height:1;
}
.ctrl.active { background:var(--amber); color:#000; }
.ctrl:active { opacity:.7; }
#xp-display {
  font-family:'DM Mono',monospace; font-size:.9rem; color:var(--amber);
  min-width:34px; text-align:center;
}
.gap { flex:1; }

/* ── Metronome flash overlay ──────────────────────────────── */
#metro-flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  opacity: 0;
  background: radial-gradient(ellipse at center,
    transparent 35%,
    rgba(245,158,11,0.25) 65%,
    rgba(255,255,255,0.55) 100%);
  transition: opacity 60ms ease-out;
}
#metro-flash.beat { opacity: 1; }

/* BPM readout in button */
#btn-metro { min-width: 72px; }
#btn-metro .bpm-sub {
  display: block; font-size: .62rem; font-weight: 400;
  opacity: .7; margin-top: 1px; letter-spacing: 0;
}

/* ── Responsive ───────────────────────────────────────────── */

/* Allow user to pinch-zoom content for readability */
#content-wrap { touch-action: pan-y pinch-zoom; }

/* Font size user-control */
#font-size-btn {
  background:var(--border); border:none; border-radius:10px; color:var(--text);
  cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:600;
  padding:10px 12px; transition:background .15s; flex-shrink:0; line-height:1;
  user-select:none;
}
#font-size-btn:active { opacity:.7; }

/* ── Phone portrait (≤ 480px) ─────────────────────────── */
@media (max-width: 480px) {
  #hdr { padding:8px 12px; gap:8px; }
  #sl-name { font-size:1.1rem; }

  #song-bar { padding:8px 12px; }
  #song-title { font-size:clamp(1.6rem,8vw,2.8rem); letter-spacing:2px; }
  #song-meta { font-size:.72rem; gap:10px; }

  #next-bar { padding:5px 12px; font-size:.72rem; }

  #song-content {
    font-size:clamp(1rem,4.5vw,1.3rem);
    line-height:1.85;
    padding:16px 14px 90px;
  }

  #controls { padding:7px 8px; gap:6px; flex-wrap:wrap; }
  .ctrl { padding:9px 11px; font-size:.78rem; }
  #metro-timeout-sel { font-size:.7rem; padding:5px 6px; }
}

/* ── Phone landscape / small tablet (481–768px) ───────── */
@media (min-width: 481px) and (max-width: 768px) {
  #song-content {
    font-size:clamp(1.05rem,3vw,1.35rem);
    padding:18px 20px 90px;
  }
}

/* ── Tablet / iPad (769–1024px) ───────────────────────── */
@media (min-width: 769px) {
  #song-content {
    font-size:clamp(1.1rem,2vw,1.6rem);
    line-height:2.1;
    padding:24px 32px 100px;
    max-width:900px;
    margin:0 auto;
  }
  #controls { padding:10px 24px; gap:12px; }
  .ctrl { padding:12px 18px; font-size:.88rem; }
}

/* ── Large screen (> 1200px) ──────────────────────────── */
@media (min-width: 1200px) {
  #song-content {
    font-size:clamp(1.2rem,1.5vw,1.8rem);
    max-width:1000px;
    padding:32px 48px 100px;
  }
}

/* ── Landscape phone: shrink chrome to maximise content ── */
@media (max-height: 500px) and (orientation: landscape) {
  #hdr { padding:5px 12px; }
  #song-bar { padding:5px 12px; }
  #song-title { font-size:clamp(1.2rem,5vw,2rem); }
  #song-meta { display:none; }
  #next-bar { padding:3px 12px; }
  #controls { padding:5px 10px; gap:6px; }
  .ctrl { padding:7px 12px; font-size:.76rem; }
}
/* ── SW update notification banner ── */

/* ── SW update notification banner ──────────────────────────── */
#sw-update-banner {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999;
  background:var(--amber); color:#000;
  font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:700;
  padding:12px 20px; text-align:center;
  box-shadow:0 -4px 20px rgba(0,0,0,.4);
}
#sw-update-banner button {
  background:#000; color:var(--amber); border:none; border-radius:6px;
  padding:6px 16px; margin-left:14px; font-weight:700; cursor:pointer;
  font-family:inherit; font-size:.85rem;
}

/* ── Font size slider ────────────────────────────────────── */
.font-size-ctrl { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.font-size-lbl { font-family:'DM Mono',monospace; color:var(--dim); font-size:.75rem; line-height:1; user-select:none; }
#m-font-slider { -webkit-appearance:none; appearance:none; width:80px; height:4px; border-radius:2px; background:var(--border); outline:none; cursor:pointer; }
#m-font-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%; background:var(--amber); cursor:pointer; }
#m-font-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--amber); cursor:pointer; border:none; }

/* ── Rehearsal banner ────────────────────────────────────── */
#rehear-banner {
  display:none; position:fixed; top:0; left:0; right:0; z-index:700;
  background:var(--purple); color:#fff;
  font-family:'Bebas Neue',sans-serif; font-size:clamp(.85rem,2.5vw,1.1rem);
  letter-spacing:2px; text-align:center; padding:5px 12px;
  pointer-events:none;
}

/* ── Signal overlay ──────────────────────────────────────── */
#signal-overlay {
  position:fixed; top:0; left:0; right:0; z-index:800;
  display:flex; align-items:center; justify-content:center;
  padding:clamp(12px,3vh,24px);
  pointer-events:none;
  opacity:0; transform:translateY(-20px);
  transition:opacity .25s ease, transform .25s ease;
}
#signal-overlay.show { opacity:1; transform:translateY(0); }
#signal-banner {
  background:var(--amber); color:#000;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.6rem,6vw,3rem); letter-spacing:4px;
  padding:clamp(10px,2vh,18px) clamp(24px,5vw,48px);
  border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.7);
  white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis;
}
</style>
</head>
<body>
<div id="sw-update-banner">
  New version available. Reload now to get the update.
  <button onclick="location.reload()">RELOAD NOW</button>
</div>

<!-- ── Name screen ─────────────────────────────────────────── -->
<div id="name-screen">
  <img src="/static/img/logo_large.png" alt="Setlist CMDR"
       style="width:clamp(180px,50vw,320px);height:auto;margin-bottom:8px;">
  <p>Select your name or type it below</p>
  <div id="member-btns" style="display:flex;flex-wrap:wrap;gap:10px;
       justify-content:center;max-width:480px;margin-bottom:8px;"></div>
  <input id="name-input" type="text" placeholder="Or type your name…" autocomplete="off" autocorrect="off" autocapitalize="words">
  <button class="join-btn" onclick="joinStage()">JOIN</button>
</div>

<!-- ── Rehearsal banner ────────────────────────────────────── -->
<div id="rehear-banner">◈ REHEARSAL MODE</div>

<!-- ── Signal overlay ──────────────────────────────────────── -->
<div id="signal-overlay">
  <div id="signal-banner"></div>
</div>

<!-- ── Metronome flash overlay ────────────────────────────── -->
<div id="metro-flash"></div>

<!-- ── Main app ───────────────────────────────────────────── -->
<div id="app">

  <div id="hdr">
    <div class="dot" id="dot"></div>
    <div id="sl-name">Waiting for band leader…</div>
    <div id="pos-badge"></div>
  </div>

  <div id="song-bar" style="display:none">
    <div id="song-title">—</div>
    <div id="song-meta"></div>
  </div>

  <div id="next-bar" style="display:none">
    <span class="next-lbl">Next →</span>
    <span id="next-title"></span>
  </div>

  <div id="content-wrap">
    <div id="waiting">
      <img class="wait-corner wait-tl" src="/static/img/logo_top_right.png"    alt="">
      <img class="wait-corner wait-br" src="/static/img/logo_bottom_left.png"  alt="">
      <img src="/static/img/logo_large.png" alt="Setlist CMDR"
           style="width:clamp(160px,45vw,300px);height:auto;opacity:.55;">
      <h2>STANDBY</h2>
      <p>Waiting for the band leader to go live…</p>
    </div>
    <div id="song-content" style="display:none"></div>
  </div>

  <div id="controls">
    <button class="ctrl active" id="btn-mode"   onclick="toggleMode()">LYRICS</button>
    <button class="ctrl"        id="btn-scroll" onclick="toggleScroll()">» AUTO</button>
    <div class="font-size-ctrl">
      <span class="font-size-lbl">A</span>
      <input type="range" id="m-font-slider" min="70" max="250" value="100" step="10"
             oninput="setFontSize(this.value)" title="Lyrics font size">
      <span class="font-size-lbl" style="font-size:1.1em;">A</span>
    </div>
    <button class="ctrl"        id="btn-metro"  onclick="toggleMetro()">
      ◉ FLASH<span class="bpm-sub" id="metro-bpm-sub"></span>
    </button>
    <select id="metro-timeout-sel" title="Auto-stop after…"
      style="background:var(--border);border:none;border-radius:10px;color:var(--dim);
             font-family:'DM Sans',sans-serif;font-size:.75rem;padding:6px 8px;
             cursor:pointer;flex-shrink:0;">
      <option value="10">10s</option>
      <option value="15">15s</option>
      <option value="20" selected>20s</option>
      <option value="30">30s</option>
    </select>
    <div class="gap"></div>
    <button class="ctrl" onclick="xpDown()">♭</button>
    <div id="xp-display">+0</div>
    <button class="ctrl" onclick="xpUp()">♯</button>
  </div>
</div>

<script>
// ── Chord transposition ───────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARM = {Db:'C#',Eb:'D#',Gb:'F#',Ab:'G#',Bb:'A#'};

function xpChord(chord, n) {
  const m = chord.match(/^([A-G][b#]?)(.*)/s);
  if (!m) return chord;
  let [,root,qual] = m;
  root = ENHARM[root] || root;
  const i = NOTES.indexOf(root);
  if (i < 0) return chord;
  return NOTES[(i + n + 120) % 12] + qual;
}

function xpText(text, n) {
  if (!n) return text;
  return text.replace(/\[([^\]]+)\]/g, (_,c) => `[${xpChord(c,n)}]`);
}

// ── State ─────────────────────────────────────────────────────
let name = localStorage.getItem('bsl_name') || '';
let mode = localStorage.getItem('bsl_mode') || 'lyrics';
let xp   = 0;
let song = null;
let slSongs = [];
let slId  = null;
let ws    = null;
let scrollTick = null;
let scrolling  = false;

// ── Boot ──────────────────────────────────────────────────────
// Load band member buttons immediately
loadMemberButtons();

if (name) {
  document.getElementById('name-input').value = name;
  boot();
}
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinStage();
});

function joinStage() {
  const v = document.getElementById('name-input').value.trim();
  if (!v) return;
  name = v;
  localStorage.setItem('bsl_name', v);
  boot();
}

async function loadMemberButtons() {
  try {
    const members = await fetch('/api/band_members').then(r => r.json());
    const container = document.getElementById('member-btns');
    if (!members.length) {
      container.style.display = 'none';
      document.querySelector('#name-screen p').textContent = 'Enter your name to join the stage';
      return;
    }
    container.innerHTML = members.map(m =>
      `<button class="member-btn" onclick="selectMember(this)" data-name="${m.name.replace(/"/g,'&quot;')}">${m.name}</button>`
    ).join('');
    container.style.display = 'flex';
  } catch { /* silent — members list is best-effort */ }
}

function selectMember(btn) {
  document.getElementById('name-input').value = btn.dataset.name;
  joinStage();
}

function boot() {
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  applyMode();
  connect();
  fallbackPoll();
  // Check if a rehearsal is already active (e.g. joined after leader clicked Rehearse)
  fetch('/api/rehearsal').then(r => r.json()).then(state => {
    if (state.active && state.song) applyRehearsal(state.song);
  }).catch(() => {});
}

// ── WebSocket ─────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  musicianWs = ws;
  ws.onopen  = () => {
    setDot('on');
    if (name) ws.send(`name:${name}`);
    // Start clock sync immediately on connect
    syncSamples = [];
    syncClock();
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'live_update')     applyLive(msg);
    if (msg.type === 'signal')          showSignal(msg.text);
    if (msg.type === 'sync_reply')      handleSyncReply(msg);
    if (msg.type === 'rehearsal_update') applyRehearsal(msg.song);
    if (msg.type === 'rehearsal_stop')   clearRehearsal();
    if (msg.type === 'metronome_start') {
      stopMetro();
      startMetroFromEpoch(msg.bpm, msg.beats_per_bar, msg.server_epoch);
      const secs = parseInt(document.getElementById('metro-timeout-sel').value) || 20;
      clearTimeout(metroTimeout);
      metroTimeout = setTimeout(stopMetro, secs * 1000);
    }
    if (msg.type === 'metronome_stop')  stopMetro();
  };
  ws.onclose = () => { setDot('off'); musicianWs = null; setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
}

setInterval(() => { if (ws && ws.readyState === 1) ws.send('ping'); }, 25000);

function setDot(s) {
  const d = document.getElementById('dot');
  d.className = 'dot ' + (s === 'on' ? 'on' : 'off');
}

// ── Fallback polling ──────────────────────────────────────────
async function fallbackPoll() {
  try {
    const r  = await fetch('/api/live');
    const st = await r.json();
    applyLive(st);
  } catch {}
  setTimeout(fallbackPoll, 12000);
}

// ── Live state handler ────────────────────────────────────────
async function applyLive(state) {
  if (!state.is_live) {
    // Only reset to standby if not in rehearsal
    if (!rehearsalSong) {
      document.getElementById('sl-name').textContent = 'Waiting for band leader…';
      document.getElementById('song-bar').style.display = 'none';
      document.getElementById('next-bar').style.display = 'none';
      document.getElementById('waiting').style.display = 'flex';
      document.getElementById('song-content').style.display = 'none';
      document.getElementById('rehear-banner').style.display = 'none';
      rehearsalSong = null;
    }
    return;
  }

  // Rehearsal deploy: song embedded directly in state, no setlist
  if (state.is_live && state.song && !state.setlist_id) {
    rehearsalSong = state.song;
    applyRehearsal(state.song);
    return;
  }

  // Normal live show with a setlist
  rehearsalSong = null;
  document.getElementById('rehear-banner').style.display = 'none';

  // Refresh setlist song list when setlist changes
  if (state.setlist_id !== slId) {
    slId = state.setlist_id;
    const r = await fetch(`/api/setlists/${slId}/songs`);
    slSongs = await r.json();
  }

  document.getElementById('sl-name').textContent = state.setlist_name || 'Live Set';

  const idx   = state.song_index || 0;
  const entry = slSongs[idx];
  const next  = slSongs[idx + 1];

  document.getElementById('pos-badge').textContent =
    `${idx + 1} / ${slSongs.length}`;

  if (entry) {
    // Fetch full song details if changed
    if (!song || song.id !== entry.id) {
      const sr = await fetch(`/api/songs/${entry.id}`);
      song = await sr.json();
      xp = 0;
      document.getElementById('xp-display').textContent = '+0';
      stopScroll();
      restartMetroIfOn();
    }
    renderSong();
    document.getElementById('song-bar').style.display = 'block';
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('song-content').style.display = 'block';
  }

  if (next) {
    document.getElementById('next-bar').style.display = 'flex';
    document.getElementById('next-title').textContent = next.title;
  } else {
    document.getElementById('next-bar').style.display = 'none';
  }
}

// ── Render ────────────────────────────────────────────────────
function renderSong() {
  if (!song) return;

  document.getElementById('song-title').textContent = song.title;

  const meta = [];
  if (song.artist)   meta.push(`<b>${song.artist}</b>`);
  if (song.song_key) meta.push(`Key: <b>${song.song_key}</b>`);
  if (song.tempo)    meta.push(`♩ <b>${song.tempo} BPM</b>`);
  document.getElementById('song-meta').innerHTML = meta.join(' · ');

  const raw  = mode === 'lyrics'
    ? (song.lyrics || '')
    : (song.chords || song.lyrics || '');
  const text = xpText(raw, xp);
  const html = mode === 'lyrics'
    ? text.replace(/\[[^\]]+\]/g, '').replace(/\n/g,'<br>')
    : text.replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>').replace(/\n/g,'<br>');

  const el = document.getElementById('song-content');
  el.innerHTML = html ||
    '<span style="color:var(--dim);font-style:italic">No content added for this song.</span>';
}

// ── Mode ──────────────────────────────────────────────────────
function toggleMode() {
  mode = mode === 'lyrics' ? 'chords' : 'lyrics';
  localStorage.setItem('bsl_mode', mode);
  applyMode();
  renderSong();
}
function applyMode() {
  const btn = document.getElementById('btn-mode');
  btn.textContent = mode === 'lyrics' ? 'LYRICS' : 'CHORDS';
  btn.classList.toggle('active', mode === 'lyrics');
}

// ── Transpose ─────────────────────────────────────────────────
function xpUp()   { if (xp < 11)  xp++; updXp(); }
function xpDown() { if (xp > -11) xp--; updXp(); }
function updXp() {
  document.getElementById('xp-display').textContent = (xp >= 0 ? '+' : '') + xp;
  renderSong();
}

// ── Autoscroll ────────────────────────────────────────────────
function toggleScroll() { scrolling ? stopScroll() : startScroll(); }
function startScroll() {
  scrolling = true;
  document.getElementById('btn-scroll').classList.add('active');
  const wrap = document.getElementById('content-wrap');
  scrollTick = setInterval(() => {
    wrap.scrollTop += 0.6;
    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight) stopScroll();
  }, 16);
}
function stopScroll() {
  scrolling = false;
  document.getElementById('btn-scroll').classList.remove('active');
  clearInterval(scrollTick);
}

// ── Clock sync (NTP-style over WebSocket) ─────────────────────
let clockOffset  = 0;
let syncSamples  = [];
let musicianWs   = null;  // set by connect()

function syncClock() {
  if (!musicianWs || musicianWs.readyState !== 1) return;
  const t0 = Date.now();
  musicianWs.send(JSON.stringify({ type: 'sync', t0 }));
}

function handleSyncReply(msg) {
  const t1     = Date.now();
  const rtt    = t1 - msg.t0;
  const offset = msg.server - (msg.t0 + rtt / 2);
  syncSamples.push({ rtt, offset });
  if (syncSamples.length < 16) {
    setTimeout(syncClock, 40);
  } else {
    // Discard the 8 worst RTT samples, average the best 8
    syncSamples.sort((a, b) => a.rtt - b.rtt);
    const good = syncSamples.slice(0, 8);
    const newOffset = good.reduce((s, x) => s + x.offset, 0) / good.length;
    // Smooth large jumps — never move the offset by more than 20ms at once
    // to avoid sudden phase jumps mid-performance
    const delta = newOffset - clockOffset;
    clockOffset = clockOffset + Math.max(-20, Math.min(20, delta));
    syncSamples = [];
  }
}

function serverNow() { return Date.now() + clockOffset; }

// Re-sync every 30 seconds (was 45)
setInterval(() => { syncSamples = []; syncClock(); }, 30000);

// ── Metronome (Web Audio lookahead scheduler) ──────────────────
let metroOn      = false;
let metroTimeout = null;
let metroBpm     = 0;
let metroEpoch   = 0;   // server_epoch converted to local ms time
let metroBar     = 4;
let _metroAc     = null;
let _metroSchedTimer    = null;
let _lastScheduledBeat  = -1;
let _audioEpoch         = 0;

const LOOKAHEAD_MS  = 100;
const SCHEDULE_INT  = 25;

function _getOrCreateAudio() {
  if (!_metroAc) {
    try { _metroAc = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (_metroAc && _metroAc.state === 'suspended') _metroAc.resume();
  return _metroAc;
}

function toggleMetro() {
  metroOn ? stopMetro() : startMetro();
}

function startMetro() {
  const bpm = song?.tempo;
  const btn = document.getElementById('btn-metro');
  if (!bpm || bpm < 20 || bpm > 300) {
    btn.style.borderColor = 'var(--red)';
    setTimeout(() => btn.style.borderColor = '', 800);
    document.getElementById('metro-bpm-sub').textContent = 'no BPM';
    return;
  }
  startMetroFromEpoch(bpm, 4, serverNow());
  const secs = parseInt(document.getElementById('metro-timeout-sel').value) || 20;
  clearTimeout(metroTimeout);
  metroTimeout = setTimeout(stopMetro, secs * 1000);
}

function startMetroFromEpoch(bpm, beatsPerBar, serverEpoch) {
  if (metroOn) _stopMetroEngine();
  metroBpm   = bpm;
  metroBar   = beatsPerBar || 4;
  metroEpoch = serverEpoch - clockOffset;
  metroOn    = true;
  document.getElementById('btn-metro').classList.add('active');
  document.getElementById('metro-bpm-sub').textContent = `${bpm} bpm`;

  const ac = _getOrCreateAudio();
  if (ac) {
    _audioEpoch = ac.currentTime + (metroEpoch - Date.now()) / 1000;
  }
  _lastScheduledBeat = -1;
  clearInterval(_metroSchedTimer);
  _metroSchedTimer = setInterval(_metroScheduler, SCHEDULE_INT);
  _metroScheduler();
}

function _metroScheduler() {
  if (!metroOn) return;
  const ac = _metroAc;
  if (!ac) { _metroSchedulerFallback(); return; }

  const beatSec  = 60 / metroBpm;
  const nowAudio = ac.currentTime;
  const horizon  = nowAudio + LOOKAHEAD_MS / 1000;
  let beat = Math.max(0, Math.floor((nowAudio - _audioEpoch) / beatSec));

  while (true) {
    const beatTime = _audioEpoch + beat * beatSec;
    if (beatTime > horizon) break;
    if (beat > _lastScheduledBeat) {
      _lastScheduledBeat = beat;
      const isDown  = (beat % metroBar + metroBar) % metroBar === 0;
      const delayMs = Math.max(0, (beatTime - nowAudio) * 1000);
      setTimeout(() => { if (metroOn) fireFlash(metroBpm, isDown); }, delayMs);
    }
    beat++;
  }
}

function _metroSchedulerFallback() {
  const beatMs  = 60000 / metroBpm;
  const elapsed = Date.now() - metroEpoch;
  const beat    = Math.max(0, Math.floor(elapsed / beatMs));
  if (beat > _lastScheduledBeat) {
    _lastScheduledBeat = beat;
    fireFlash(metroBpm, (beat % metroBar + metroBar) % metroBar === 0);
  }
}

function _stopMetroEngine() {
  clearInterval(_metroSchedTimer);
  _metroSchedTimer   = null;
  _lastScheduledBeat = -1;
}

function stopMetro() {
  metroOn = false;
  clearTimeout(metroTimeout);
  _stopMetroEngine();
  document.getElementById('metro-flash').classList.remove('beat');
  document.getElementById('btn-metro').classList.remove('active');
  document.getElementById('metro-bpm-sub').textContent = '';
}

function fireFlash(bpm, isDown) {
  const flash  = document.getElementById('metro-flash');
  const beatMs = 60000 / (bpm || 120);
  flash.style.background = isDown
    ? 'radial-gradient(ellipse at center,transparent 30%,rgba(245,158,11,0.4) 65%,rgba(255,255,255,0.7) 100%)'
    : 'radial-gradient(ellipse at center,transparent 35%,rgba(245,158,11,0.15) 68%,rgba(255,255,255,0.38) 100%)';
  flash.classList.add('beat');
  setTimeout(() => flash.classList.remove('beat'),
    isDown ? Math.min(120, beatMs * 0.18) : Math.min(80, beatMs * 0.12));
}

function restartMetroIfOn() {
  if (!metroOn) return;
  stopMetro();
  startMetro();
}

// ── Rehearsal ────────────────────────────────────────────────
let rehearsalSong = null;

function applyRehearsal(s) {
  rehearsalSong = s;
  song = s;  // reuse the same song object so controls (transpose, metro) work
  xp   = 0;
  document.getElementById('xp-display').textContent = '+0';
  stopScroll();
  restartMetroIfOn();

  // Show banner and song content; hide standby if not live
  document.getElementById('rehear-banner').style.display = 'block';
  document.getElementById('song-title').textContent = s.title;
  const meta = [];
  if (s.artist)   meta.push(`<b>${s.artist}</b>`);
  if (s.song_key) meta.push(`Key: <b>${s.song_key}</b>`);
  if (s.tempo)    meta.push(`♩ <b>${s.tempo} BPM</b>`);
  document.getElementById('song-meta').innerHTML = meta.join(' · ');
  document.getElementById('song-bar').style.display = 'block';
  document.getElementById('next-bar').style.display = 'none';
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('song-content').style.display = 'block';
  document.getElementById('sl-name').textContent = 'REHEARSAL';
  document.getElementById('pos-badge').textContent = '';
  renderSong();
}

function clearRehearsal() {
  rehearsalSong = null;
  song          = null;
  document.getElementById('rehear-banner').style.display  = 'none';
  document.getElementById('sl-name').textContent          = 'Waiting for band leader…';
  document.getElementById('song-bar').style.display       = 'none';
  document.getElementById('next-bar').style.display       = 'none';
  document.getElementById('waiting').style.display        = 'flex';
  document.getElementById('song-content').style.display   = 'none';
  // Let the next WS live_update or fallback poll restore the live state if needed
}

// ── Font size ─────────────────────────────────────────────────
function setFontSize(pct) {
  const el = document.getElementById('song-content');
  if (el) el.style.fontSize = (parseFloat(pct) / 100) + 'em';
  localStorage.setItem('m_font_pct', pct);
}
(function initMFont() {
  const saved = localStorage.getItem('m_font_pct');
  if (saved) {
    const slider = document.getElementById('m-font-slider');
    if (slider) { slider.value = saved; setFontSize(saved); }
  }
})();

// ── Signal overlay ────────────────────────────────────────────
let signalTimer = null;
function showSignal(text) {
  const overlay = document.getElementById('signal-overlay');
  const banner  = document.getElementById('signal-banner');
  banner.textContent = text;
  overlay.classList.add('show');
  if (signalTimer) clearTimeout(signalTimer);
  signalTimer = setTimeout(() => overlay.classList.remove('show'), 3000);
}
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'sw_updated') {
      document.getElementById('sw-update-banner').style.display = 'block';
    }
  });
}
</script>
